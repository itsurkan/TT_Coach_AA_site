<style>
  :root {
    --bg: #FAF7F2;
    --bg-2: #F2EEE6;
    --ink: #1A1A1F;
    --ink-2: #3A3A42;
    --ink-3: #6B6B75;
    --line: #E6E1D6;
    --navy: #1E4DA8;
    --navy-2: #163E8A;
    --sage: #9FE0C4;
    --sage-2: #2F9D7A;
    --sage-bg: #E8F5EE;
    --amber: #F5B547;
    --amber-bg: #FBE8C4;
    --canvas: #1A1A1F;
    --canvas-2: #25252C;
    --sage-ink: #0E5F48;
    --accent: var(--navy);
  }
  [data-palette="amber"] { --accent: #D9892C; --navy: #D9892C; --navy-2: #B36C16; }
  [data-palette="sage"] { --accent: #1F8A63; --navy: #1F8A63; --navy-2: #14664A; }
  [data-theme="dark"] {
    --bg: #0E0E12;
    --bg-2: #16161B;
    --ink: #F2EEE6;
    --ink-2: #C9C7BF;
    --ink-3: #8A8A92;
    --line: #2A2A32;
    --canvas: #06060A;
    --canvas-2: #14141A;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html { scroll-behavior: smooth; }
  body {
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    background: var(--bg);
    color: var(--ink);
    font-feature-settings: 'ss01', 'cv11';
    -webkit-font-smoothing: antialiased;
    overflow-x: hidden;
  }
  img { display: block; max-width: 100%; }
  .mono { font-family: 'JetBrains Mono', monospace; }
  ::selection { background: var(--amber); color: var(--ink); }
</style>
</head>

<div id="root"></div>
